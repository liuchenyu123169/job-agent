# few_shots/match_analyze.yaml

- input:
    resume_content: "3年Java后端开发经验，熟练使用Spring Boot和MyBatis，参与过电商系统订单模块的开发。熟悉MySQL和Redis，了解JVM调优。项目经验包括订单系统、库存同步服务。"
    job_jd: "招聘Java后端开发工程师，要求5年以上经验，精通Spring Cloud微服务架构，有分布式系统设计经验，熟悉Kafka/RabbitMQ消息队列，有高并发场景优化经验。"
  output:
    match_score: 65
    advantages:
      - "Spring Boot和MyBatis经验匹配岗位基础要求"
      - "有电商业务经验，理解订单和库存场景"
      - "数据库和缓存技术栈（MySQL/Redis）完全覆盖"
    weaknesses:
      - "岗位要求5年，候选人3年，年限有差距"
      - "缺少Spring Cloud微服务实际经验"
      - "没有消息队列（Kafka/RabbitMQ）项目经验"
      - "分布式系统设计经验不足"
    suggestions:
      - "补充一个Spring Cloud微服务实战项目（Gateway/Feign/Nacos）"
      - "学习Kafka核心概念并在项目中集成消息队列"
      - "准备高并发场景的面试回答（缓存穿透/击穿/雪崩）"
      - "在简历中量化订单系统的性能指标（QPS/RT）"

