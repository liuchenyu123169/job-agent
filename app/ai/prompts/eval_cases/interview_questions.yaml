# eval_cases/interview_questions.yaml

- name: "Java后端-有RAG知识"
  variables:
    resume_content: "3年Java开发，Spring Boot+MyBatis，做过CRM系统，熟悉MySQL和Redis。"
    job_jd: "Java后端工程师，要求Spring Boot、MySQL、Redis，有分布式经验优先。"
    knowledge_context: "【知识片段1】标题：MySQL索引原理 内容：InnoDB使用B+Tree作为索引结构... 【知识片段2】标题：Redis缓存策略 内容：缓存穿透/击穿/雪崩的定义和解决方案..."
  checks:
    has_fields: [technical_questions, project_questions, behavior_questions, risk_questions]
    technical_min_count: 3
  keywords:
    - "B+Tree"
    - "Redis"

