- name: "高级岗位-有RAG且知识多"
  variables:
    resume_content: "6年Java架构师，Spring Cloud微服务，K8s和Docker，Kafka和RabbitMQ，MySQL分库分表。"
    job_jd: "资深后端架构师，精通分布式系统设计，有高并发和高可用经验，熟悉中间件选型和调优。"
    knowledge_context: "【知识片段1】标题：分布式事务解决方案 内容：2PC/TCC/SAGA/可靠消息最终一致... 【知识片段2】标题：微服务拆分原则 内容：按业务域拆分... 【知识片段3】标题：Kafka高性能原理 内容：顺序写磁盘+零拷贝+页缓存..."
  checks:
    has_fields: [technical_questions, project_questions, behavior_questions, risk_questions]
    technical_min_count: 4
  keywords:
    - "分布式"
    - "Kafka"
