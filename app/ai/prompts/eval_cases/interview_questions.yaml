    knowledge_context: "【知识片段1】标题：RAG中chunk size的影响 内容：chunk过大会导致检索精度下降... 【知识片段2】标题：LangGraph Agent工作流 内容：StateGraph通过节点和条件边实现复杂Agent编排..."
  checks:
    has_fields: [technical_questions, project_questions, behavior_questions, risk_questions]
